<!DOCTYPE html>
<html lang="es">
<head>
  
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="description" content="Cocina 360 - Sistema POS" />
    <title>🍳 Cocina 360 - POS</title>
</head>
<script>
  // Forzar zona horaria México
  const originalDate = Date;
  Date = class extends originalDate {
    constructor(...args) {
      if (args.length === 0) {
        super(new originalDate().toLocaleString('en-US', { timeZone: 'America/Monterrey' }));
      } else {
        super(...args);
      }
    }
  };
</script>
<body>
    <noscript>Necesitas JavaScript para usar Cocina 360</noscript>
    <div id="root"></div>
</body>
</html>
